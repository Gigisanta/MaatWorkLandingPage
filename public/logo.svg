<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="32" cy="32" r="30" fill="url(#logoGradient)" opacity="0.15"/>

  <!-- Star accent -->
  <path d="M48 12 L50 18 L56 18 L51 22 L53 28 L48 24 L43 28 L45 22 L40 18 L46 18 Z"
        fill="url(#starGradient)"
        filter="url(#glow)"
        opacity="0.9"/>

  <!-- Main M letter with gradient -->
  <path d="M16 44 L16 20 L24 32 L32 20 L40 32 L48 20 L48 44"
        fill="none"
        stroke="url(#logoGradient)"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Orbit ring -->
  <ellipse cx="32" cy="38"
           rx="22"
           ry="8"
           fill="none"
           stroke="url(#logoGradient)"
           stroke-width="1.5"
           opacity="0.4"
           stroke-dasharray="4 3"/>
</svg>