<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0520"/>
      <stop offset="50%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#2d1065"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="m" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4b8ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle top highlight -->
  <rect x="8" y="8" width="496" height="220" rx="100" fill="url(#shine)"/>

  <!-- Outer ring -->
  <rect x="8" y="8" width="496" height="496" rx="100" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Bold M -->
  <g filter="url(#glow)">
    <path d="
      M 100 380 L 100 140 Q 100 120 120 120 L 165 120 Q 175 120 180 130
      L 256 280 L 332 130 Q 337 120 347 120 L 392 120 Q 412 120 412 140
      L 412 380 Q 412 400 392 400 L 360 400 Q 340 400 340 380 L 340 220
      L 290 360 Q 285 375 270 375 L 242 375 Q 227 375 222 360 L 172 220
      L 172 380 Q 172 400 152 400 L 120 400 Q 100 400 100 380 Z
    " fill="url(#m)" opacity="0.95"/>
  </g>

  <!-- Accent dot -->
  <circle cx="420" cy="140" r="18" fill="url(#accent)" opacity="0.8"/>
</svg>
